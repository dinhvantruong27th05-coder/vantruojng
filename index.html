<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kỉ Niệm Thanh Xuân</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js"></script>

<style>
body{font-family:sans-serif;background:#111;color:#fff;text-align:center}
button{padding:10px;margin:5px;cursor:pointer}
.post{background:#222;margin:10px;padding:10px;border-radius:10px}
img,video{max-width:100%;border-radius:10px}
</style>
</head>

<body>

<h1>📸 Thanh Xuân</h1>

<button onclick="login()">Đăng nhập Google</button>
<button onclick="logout()">Đăng xuất</button>

<br><br>

<input type="file" id="file" accept="image/*,video/*">
<input type="text" id="caption" placeholder="Viết gì đó...">
<button onclick="upload()">Đăng</button>

<div id="feed"></div>

<audio id="music" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" loop></audio>
<button onclick="toggleMusic()">🎵 Nhạc</button>

<script>
const firebaseConfig = {
  apiKey: "DÁN VÀO",
  authDomain: "DÁN VÀO",
  projectId: "DÁN VÀO",
  storageBucket: "DÁN VÀO",
  messagingSenderId: "DÁN VÀO",
  appId: "DÁN VÀO"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
const storage = firebase.storage();

let user = null;

function login(){
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider);
}

function logout(){
  auth.signOut();
}

auth.onAuthStateChanged(u=>{
  user = u;
  loadPosts();
});

async function upload(){
  let file = document.getElementById("file").files[0];
  let caption = document.getElementById("caption").value;

  if(!file) return alert("Chọn file!");

  let ref = storage.ref("posts/"+Date.now());
  await ref.put(file);
  let url = await ref.getDownloadURL();

  await db.collection("posts").add({
    url,
    type:file.type,
    caption,
    likes:0,
    comments:[],
    user:user.displayName
  });

  loadPosts();
}

async function loadPosts(){
  let feed = document.getElementById("feed");
  feed.innerHTML = "";

  let snap = await db.collection("posts").get();

  snap.forEach(doc=>{
    let p = doc.data();

    let media = p.type.startsWith("image")
      ? `<img src="${p.url}">`
      : `<video src="${p.url}" controls></video>`;

    feed.innerHTML += `
      <div class="post">
        <h3>${p.user}</h3>
        ${media}
        <p>${p.caption}</p>
        <button onclick="like('${doc.id}',${p.likes})">❤️ ${p.likes}</button>
        <input placeholder="comment" onkeydown="if(event.key==='Enter') comment('${doc.id}',this.value)">
      </div>
    `;
  });
}

async function like(id,likes){
  await db.collection("posts").doc(id).update({
    likes:likes+1
  });
  loadPosts();
}

async function comment(id,text){
  let ref = db.collection("posts").doc(id);
  let doc = await ref.get();
  let comments = doc.data().comments || [];

  comments.push(text);

  await ref.update({comments});
  loadPosts();
}

function toggleMusic(){
  let m = document.getElementById("music");
  m.paused ? m.play() : m.pause();
}
</script>

</body>
</html>
