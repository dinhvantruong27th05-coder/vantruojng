<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thanh Xuân Của Tôi</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg,#ffe0ec,#e0f0ff);
}

/* HEADER */
header {
  text-align:center;
  padding:20px;
  color:#333;
}

/* FORM */
.form {
  background:#fff;
  padding:20px;
  margin:20px auto;
  max-width:500px;
  border-radius:15px;
}

.form input, .form textarea {
  width:100%;
  padding:10px;
  margin:8px 0;
}

/* BUTTON */
button {
  padding:10px;
  background:#ff6fae;
  border:none;
  color:#fff;
  cursor:pointer;
  border-radius:8px;
}

/* SEARCH */
.search {
  text-align:center;
  margin:20px;
}

.search input {
  padding:10px;
  width:300px;
}

/* GALLERY */
.gallery {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:15px;
  padding:20px;
}

.card {
  background:#fff;
  border-radius:10px;
  overflow:hidden;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
  transition:0.3s;
}

.card:hover {
  transform:translateY(-5px);
}

.card img {
  width:100%;
  height:200px;
  object-fit:cover;
}

.card .info {
  padding:10px;
}

.delete {
  background:red;
  margin-top:10px;
}

/* LIGHTBOX */
.lightbox {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.8);
  display:none;
  justify-content:center;
  align-items:center;
}

.lightbox img {
  max-width:80%;
  max-height:80%;
}

/* MOBILE */
@media(max-width:600px){
  .search input {
    width:90%;
  }
}
</style>
</head>

<body>

<header>
  <h1>📸 Thanh Xuân Của Tôi</h1>
</header>

<div class="form">
  <input type="file" id="image">
  <input type="text" id="title" placeholder="Tiêu đề">
  <textarea id="desc" placeholder="Mô tả"></textarea>
  <button onclick="addImage()">Lưu kỉ niệm</button>
</div>

<div class="search">
  <input type="text" id="search" placeholder="Tìm kiếm..." oninput="render()">
</div>

<div class="gallery" id="gallery"></div>

<div class="lightbox" id="lightbox" onclick="this.style.display='none'">
  <img id="lightImg">
</div>

<script>
let data = JSON.parse(localStorage.getItem("memories")) || [];

function addImage(){
  let file = document.getElementById("image").files[0];
  let title = document.getElementById("title").value;
  let desc = document.getElementById("desc").value;

  if(!file) return alert("Chọn ảnh!");

  let reader = new FileReader();
  reader.onload = function(){
    data.push({
      img: reader.result,
      title,
      desc,
      date: new Date().toLocaleDateString()
    });

    localStorage.setItem("memories", JSON.stringify(data));
    render();
  }
  reader.readAsDataURL(file);
}

function render(){
  let gallery = document.getElementById("gallery");
  let keyword = document.getElementById("search").value.toLowerCase();

  gallery.innerHTML = "";

  data.forEach((item, index)=>{
    if(item.title.toLowerCase().includes(keyword) || item.desc.toLowerCase().includes(keyword)){
      gallery.innerHTML += `
        <div class="card">
          <img src="${item.img}" onclick="view('${item.img}')">
          <div class="info">
            <h3>${item.title}</h3>
            <p>${item.desc}</p>
            <small>${item.date}</small>
            <button class="delete" onclick="del(${index})">Xóa</button>
          </div>
        </div>
      `;
    }
  });
}

function del(i){
  if(confirm("Xóa ảnh?")){
    data.splice(i,1);
    localStorage.setItem("memories", JSON.stringify(data));
    render();
  }
}

function view(src){
  document.getElementById("lightbox").style.display = "flex";
  document.getElementById("lightImg").src = src;
}

render();
</script>

</body>
</html>
