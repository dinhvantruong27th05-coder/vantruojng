<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NatureScape</title>

<!-- FONT -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    scroll-behavior: smooth;
}

/* NAVBAR */
nav {
    position: fixed;
    width: 100%;
    padding: 15px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(0,0,0,0.3);
    backdrop-filter: blur(10px);
    z-index: 999;
    transition: 0.3s;
}

nav.scrolled {
    background: #111;
}

nav h1 {
    color: #fff;
}

nav ul {
    display: flex;
    list-style: none;
}

nav ul li {
    margin-left: 20px;
}

nav ul li a {
    color: #fff;
    text-decoration: none;
    transition: 0.3s;
}

nav ul li a:hover {
    color: #00ffcc;
}

/* HERO */
.hero {
    height: 100vh;
    background: url("https://images.unsplash.com/photo-1501785888041-af3ef285b470") no-repeat center/cover;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    color: #fff;
}

.hero h2 {
    font-size: 50px;
}

.hero p {
    margin-top: 10px;
}

.btn {
    margin-top: 20px;
    padding: 10px 25px;
    border: none;
    background: #00ffcc;
    color: #000;
    cursor: pointer;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.1);
}

/* SECTION */
section {
    padding: 80px 40px;
    text-align: center;
}

.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
    gap: 20px;
}

.card {
    overflow: hidden;
    border-radius: 10px;
}

.card img {
    width: 100%;
    transition: 0.5s;
}

.card:hover img {
    transform: scale(1.2);
}

/* ABOUT */
.about {
    background: #f5f5f5;
}

/* CONTACT */
.contact input, .contact textarea {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
}

/* FOOTER */
footer {
    background: #111;
    color: #fff;
    padding: 20px;
}

/* ANIMATION */
.fade {
    opacity: 0;
    transform: translateY(30px);
    transition: 1s;
}

.fade.show {
    opacity: 1;
    transform: translateY(0);
}

/* RESPONSIVE */
@media(max-width:768px){
    .hero h2 {
        font-size: 30px;
    }
}
</style>
</head>

<body>

<!-- NAV -->
<nav id="nav">
    <h1>NatureScape</h1>
    <ul>
        <li><a href="#home">Trang chủ</a></li>
        <li><a href="#gallery">Phong cảnh</a></li>
        <li><a href="#about">Giới thiệu</a></li>
        <li><a href="#contact">Liên hệ</a></li>
    </ul>
</nav>

<!-- HERO -->
<section class="hero" id="home">
    <div>
        <h2>Khám phá thiên nhiên</h2>
        <p>Vẻ đẹp thế giới trong tầm tay</p>
        <button class="btn">Xem ngay</button>
    </div>
</section>

<!-- GALLERY -->
<section id="gallery" class="fade">
    <h2>Phong cảnh đẹp</h2>
    <div class="gallery">
        <div class="card"><img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee"></div>
        <div class="card"><img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e"></div>
        <div class="card"><img src="https://images.unsplash.com/photo-1493244040629-496f6d136cc3"></div>
        <div class="card"><img src="https://images.unsplash.com/photo-1519817914152-22f90e29c1b2"></div>
    </div>
</section>

<!-- ABOUT -->
<section class="about fade" id="about">
    <h2>Giới thiệu</h2>
    <p>Website chia sẻ những cảnh đẹp thiên nhiên trên toàn thế giới với thiết kế hiện đại, mượt mà.</p>
</section>

<!-- CONTACT -->
<section class="contact fade" id="contact">
    <h2>Liên hệ</h2>
    <input type="text" placeholder="Tên">
    <input type="email" placeholder="Email">
    <textarea placeholder="Nội dung"></textarea>
    <button class="btn">Gửi</button>
</section>

<!-- FOOTER -->
<footer>
    <p>© 2026 NatureScape</p>
</footer>

<script>
// NAV SCROLL
window.addEventListener("scroll", () => {
    let nav = document.getElementById("nav");
    nav.classList.toggle("scrolled", window.scrollY > 50);
});

// FADE EFFECT
const fades = document.querySelectorAll('.fade');

window.addEventListener('scroll', () => {
    fades.forEach(el => {
        let top = el.getBoundingClientRect().top;
        if(top < window.innerHeight - 100){
            el.classList.add('show');
        }
    });
});
</script>

</body>
</html>
